name: VIX 恐慌指數監控

on:
  schedule:
    # 每 5 分鐘執行一次（UTC 時間，台灣時間 = UTC+8）
    - cron: '*/5 * * * *'
    # 每天 01:00 UTC = 台灣時間 09:00 發送日報
    - cron: '0 1 * * *'
  workflow_dispatch:   # 允許手動觸發（測試用）

permissions:
  contents: write      # 允許寫回 state 檔案

jobs:
  check-vix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests pytz

      - name: Restore state file
        uses: actions/cache@v4
        with:
          path: vix_state.json
          key: vix-state-${{ github.run_id }}
          restore-keys: |
            vix-state-

      - name: Run VIX check (every 5 min)
        # 日報 cron (0 1 * * *) 時跳過此步驟
        if: github.event.schedule != '0 1 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vix_monitor.py --check

      - name: Run daily report (09:00 台灣時間)
        if: github.event.schedule == '0 1 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vix_monitor.py --daily

      - name: Save state file
        uses: actions/cache@v4
        with:
          path: vix_state.json
          key: vix-state-${{ github.run_id }}
