name: VIX 恐慌指數監控

on:
  schedule:
    # 每 30 分鐘執行一次（UTC 時間，台灣時間 = UTC+8）
    - cron: '*/30 * * * *'
    # 每天 13:00 UTC = 台灣時間 21:00 發送晚報
    - cron: '0 13 * * *'
  workflow_dispatch:   # 允許手動觸發（測試用）

permissions:
  contents: write      # 允許寫回 state 檔案

jobs:
  check-vix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests pytz


      - name: Run VIX check (every 5 min)
        # 晚報 cron (0 13 * * *) 時跳過此步驟
        if: github.event.schedule != '0 13 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vix_monitor.py --check

      - name: Run daily report (21:00 台灣時間)
        if: github.event.schedule == '0 13 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python vix_monitor.py --daily

      - name: Save state to git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vix_state.json || true
          git diff --staged --quiet || git commit -m "chore: update vix state [skip ci]"
          git push || true
